<script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pCanvas = document.getElementById('previewCanvas');
        const pCtx = pCanvas.getContext('2d');

        let socket; let myId; let players = {}; 
        let projectiles = []; let telegraphs = [];
        let gameState = { status: "playing" };
        let gameRunning = false; let isMobile = false;

        let myCustomColor = localStorage.getItem('b_color') || '#ffffff';
        let myCustomHat = localStorage.getItem('b_hat') || 'none';
        let mySelectedClass = localStorage.getItem('b_class') || 'mage';

        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            isMobile = true;
        }

        const walls = [
            { x: 200, y: 150, w: 40, h: 200 },
            { x: 560, y: 150, w: 40, h: 200 },
            { x: 350, y: 230, w: 100, h: 40 }
        ];

        const inputState = { up: false, down: false, left: false, right: false };
        let joystickVector = { x: 0, y: 0 };
        let lastFacingDir = { x: 1, y: 0 };

        // ระบบบันทึกเวลา Cooldown ในเครื่องผู้เล่น (มิลลิวินาที) ⏳
        let cooldowns = { skill1: 0, skill2: 0 }; 
        const COOLDOWN_TIMES = { skill1: 2000, skill2: 5000 }; // สกิล 1 คูลดาวน์ 2 วิ, สกิล 2 คูลดาวน์ 5 วิ

        window.addEventListener('DOMContentLoaded', () => {
            try {
                if(localStorage.getItem('b_name')) { 
                    document.getElementById('username').value = localStorage.getItem('b_name'); 
                }
                updateCustomUI();
                drawPreview();
            } catch(e) {
                console.error("เกิดข้อผิดพลาดตอนโหลดเมนู:", e);
            }
        });

        function updateCustomUI() {
            document.querySelectorAll('.color-dot').forEach(el => el.classList.remove('active'));
            const activeColor = document.getElementById(`col-${myCustomColor}`);
            if(activeColor) activeColor.classList.add('active');

            document.querySelectorAll('.hat-picker .btn-option').forEach(el => el.classList.remove('active'));
            const activeHat = document.getElementById(`hat-${myCustomHat}`);
            if(activeHat) activeHat.classList.add('active');

            document.querySelectorAll('.class-picker .btn-option').forEach(el => el.classList.remove('active'));
            const activeClass = document.getElementById(`class-${mySelectedClass}`);
            if(activeClass) activeClass.classList.add('active');
        }

        function selectColor(color) { myCustomColor = color; localStorage.setItem('b_color', color); updateCustomUI(); drawPreview(); }
        function selectHat(hat) { myCustomHat = hat; localStorage.setItem('b_hat', hat); updateCustomUI(); drawPreview(); }
        function selectClass(cls) { mySelectedClass = cls; localStorage.setItem('b_class', cls); updateCustomUI(); drawPreview(); }

        function drawPreview() {
            if (!pCtx) return;
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            pCtx.save();
            pCtx.scale(1.4, 1.4);
            drawStickmanVisual(pCtx, 45, 80, myCustomColor, myCustomHat, 0, 0);
            pCtx.restore();
        }

        function drawStickmanVisual(context, x, y, baseColor, hatType, vx, vy) {
            context.strokeStyle = baseColor; context.fillStyle = baseColor; context.lineWidth = 3;
            context.beginPath(); context.arc(x, y - 15, 6, 0, Math.PI * 2); context.stroke();
            context.beginPath(); context.moveTo(x, y - 9); context.lineTo(x, y + 5); context.stroke();
            context.beginPath(); context.moveTo(x - 10, y - 5); context.lineTo(x + 10, y - 5); context.stroke();
            
            let limitedVx = Math.max(-4.0, Math.min(4.0, vx));
            context.beginPath(); context.moveTo(x, y + 5);
            context.lineTo(x - 6 + (limitedVx * 2), y + 18); context.moveTo(x, y + 5);
            context.lineTo(x + 6 - (limitedVx * 2), y + 18); context.stroke();

            if(hatType && hatType !== 'none') {
                context.fillStyle = (hatType === 'crown') ? '#f1c40f' : ((hatType === 'chef') ? '#fff' : baseColor);
                if (hatType === 'cowboy') {
                    context.fillRect(x - 14, y - 22, 28, 3); context.fillRect(x - 8, y - 32, 16, 10);
                } else if (hatType === 'chef') {
                    context.beginPath(); context.arc(x, y - 25, 8, 0, Math.PI * 2); context.fill();
                    context.fillRect(x - 6, y - 22, 12, 6);
                } else if (hatType === 'crown') {
                    context.beginPath(); context.moveTo(x - 9, y - 20); context.lineTo(x - 12, y - 30); context.lineTo(x - 4, y - 24); context.lineTo(x, y - 34); context.lineTo(x + 4, y - 24); context.lineTo(x + 12, y - 30); context.lineTo(x + 9, y - 20); context.closePath(); context.fill();
                }
            }
        }

        function setupControls() {
            window.addEventListener('keydown', e => { 
                handleKey(e.key, true); 
                if(e.key.toLowerCase() === 'q') useSkill(1);
                if(e.key.toLowerCase() === 'e') useSkill(2);
            });
            window.addEventListener('keyup', e => { handleKey(e.key, false); });
            if (isMobile) { document.getElementById('mobile-controls').style.display = 'flex'; setupJoystick(); }
        }

        function handleKey(key, isPressed) {
            key = key.toLowerCase();
            if (key === 'w' || key === 'arrowup') inputState.up = isPressed;
            if (key === 's' || key === 'arrowdown') inputState.down = isPressed;
            if (key === 'a' || key === 'arrowleft') inputState.left = isPressed;
            if (key === 'd' || key === 'arrowright') inputState.right = isPressed;
        }

        function setupJoystick() {
            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');
            let maxRadius = 30; let dragStart = null;

            base.addEventListener('touchstart', (e) => {
                e.preventDefault(); const touch = e.touches[0]; const baseRect = base.getBoundingClientRect();
                dragStart = { x: baseRect.left + baseRect.width / 2, y: baseRect.top + baseRect.height / 2 };
            });
            base.addEventListener('touchmove', (e) => {
                if (!dragStart) return; e.preventDefault(); const touch = e.touches[0];
                let deltaX = touch.clientX - dragStart.x; let deltaY = touch.clientY - dragStart.y;
                let distance = Math.hypot(deltaX, deltaY);
                if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; }
                stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                joystickVector.x = deltaX / maxRadius; joystickVector.y = deltaY / maxRadius;
            });
            const stopJoystick = (e) => {
                if (!dragStart) return; dragStart = null; stick.style.transform = `translate(0px, 0px)`;
                joystickVector.x = 0; joystickVector.y = 0;
            };
            base.addEventListener('touchend', stopJoystick); base.addEventListener('touchcancel', stopJoystick);
        }

        function drawWalls() {
            ctx.fillStyle = '#444444'; ctx.strokeStyle = '#666666'; ctx.lineWidth = 2;
            walls.forEach(wall => { ctx.fillRect(wall.x, wall.y, wall.w, wall.h); ctx.strokeRect(wall.x, wall.y, wall.w, wall.h); });
        }

        function useSkill(skillNumber) {
            let me = players[myId];
            if (!me || me.isSpectator || me.health <= 0) return;
            
            let now = Date.now();
            let cdKey = 'skill' + skillNumber;
            
            // ตรวจสอบคูลดาวน์ภายในเครื่องผู้เล่น ⏳
            if (now < cooldowns[cdKey]) return;

            // ตั้งค่าคูลดาวน์ใหม่ทันที
            cooldowns[cdKey] = now + COOLDOWN_TIMES[cdKey];
            
            socket.emit('cast_skill', { skillNum: skillNumber, dirX: lastFacingDir.x, dirY: lastFacingDir.y });
        }

        function startGame() {
            let nameInput = document.getElementById('username').value.trim();
            if (nameInput === "") nameInput = "Player_" + Math.floor(Math.random() * 900 + 100);
            localStorage.setItem('b_name', nameInput);

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            setupControls();
            
            socket = io('https://tag-game-server.onrender.com'); 

            socket.on('connect', () => { 
                myId = socket.id; 
                socket.emit('join_game', { name: nameInput, color: myCustomColor, hat: myCustomHat, charClass: mySelectedClass }); 
            });
            
            socket.on('current_players', (serverPlayers) => { 
                Object.keys(serverPlayers).forEach(id => { serverPlayers[id].targetX = serverPlayers[id].x; serverPlayers[id].targetY = serverPlayers[id].y; });
                players = serverPlayers; 
            });
            socket.on('new_player', (newPlayerData) => { newPlayerData.targetX = newPlayerData.x; newPlayerData.targetY = newPlayerData.y; players[newPlayerData.id] = newPlayerData; });
            
            socket.on('player_updated', (updatedPlayer) => { 
                if (!players[updatedPlayer.id]) {
                    players[updatedPlayer.id] = updatedPlayer;
                    players[updatedPlayer.id].targetX = updatedPlayer.x; players[updatedPlayer.id].targetY = updatedPlayer.y;
                } else {
                    players[updatedPlayer.id].health = updatedPlayer.health;
                    players[updatedPlayer.id].isSpectator = updatedPlayer.isSpectator;
                    players[updatedPlayer.id].color = updatedPlayer.color;
                    players[updatedPlayer.id].hat = updatedPlayer.hat;
                    players[updatedPlayer.id].charClass = updatedPlayer.charClass;
                    if (updatedPlayer.id !== myId) {
                        players[updatedPlayer.id].vx = updatedPlayer.vx; players[updatedPlayer.id].vy = updatedPlayer.vy;
                        players[updatedPlayer.id].targetX = updatedPlayer.x; players[updatedPlayer.id].targetY = updatedPlayer.y;
                    }
                }
            });
            
            socket.on('player_disconnected', (id) => { delete players[id]; });
            
            socket.on('skill_telegraph', (data) => {
                telegraphs.push({ 
                    ownerId: data.ownerId,
                    skillNum: data.skillNum, // รับข้อมูลประเภทสกิลมาเพื่อวาดเส้นเล็งให้ถูกประเภท
                    type: data.type, 
                    endTime: Date.now() + 1000 
                });
            });
            
            socket.on('skill_projectile', (proj) => { projectiles.push(proj); });
            socket.on('game_over_died', () => { alert("💥 คุณหมดสภาพการต่อสู้! (หัวใจหมด 3 ดวง)"); backToMenu(); });

            gameRunning = true; window.requestAnimationFrame(gameLoop);
        }

        function backToMenu() {
            gameRunning = false; if(socket) socket.disconnect();
            projectiles = []; telegraphs = []; cooldowns = { skill1: 0, skill2: 0 };
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('menu-container').style.display = 'block';
            drawPreview();
        }

        function updateLocalPlayer() {
            let me = players[myId];
            if (!me || me.isSpectator || me.health <= 0) return;
            let baseSpeed = 4.0; let targetVx = 0; let targetVy = 0;
            if (isMobile) {
                targetVx = joystickVector.x * baseSpeed; targetVy = joystickVector.y * baseSpeed;
            } else {
                if (inputState.up) targetVy = -baseSpeed;
                if (inputState.down) targetVy = baseSpeed;
                if (inputState.left) targetVx = -baseSpeed;
                if (inputState.right) targetVx = baseSpeed;
                if (targetVx !== 0 && targetVy !== 0) { targetVx *= 0.7071; targetVy *= 0.7071; }
            }
            me.vx = targetVx; me.vy = targetVy;
            
            if (me.vx !== 0 || me.vy !== 0) { 
                let len = Math.hypot(me.vx, me.vy); 
                lastFacingDir = { x: me.vx / len, y: me.vy / len }; 
                me.facingX = lastFacingDir.x;
                me.facingY = lastFacingDir.y;
            } else {
                if(me.facingX === undefined) { me.facingX = 1; me.facingY = 0; }
            }

            let radius = 12;
            me.x += me.vx; handleWallCollision(me, 'x', radius); me.x = Math.max(radius, Math.min(canvas.width - radius, me.x));
            me.y += me.vy; handleWallCollision(me, 'y', radius); me.y = Math.max(radius + 40, Math.min(canvas.height - radius, me.y));
            if (socket && socket.connected) { 
                socket.emit('player_move_direct', { x: me.x, y: me.y, vx: me.vx, vy: me.vy, facingX: me.facingX, facingY: me.facingY }); 
            }
        }

        function lerpPlayers() {
            Object.keys(players).forEach(id => {
                let p = players[id];
                if (id !== myId && p.targetX !== undefined && p.targetY !== undefined) {
                    p.x += (p.targetX - p.x) * 0.25; p.y += (p.targetY - p.y) * 0.25;
                }
            });
        }

        function handleWallCollision(playerObj, axis, radius) {
            for (let wall of walls) {
                if (playerObj.x + radius > wall.x && playerObj.x - radius < wall.x + wall.w && playerObj.y + radius > wall.y && playerObj.y - radius < wall.y + wall.h) {
                    if (axis === 'x') { playerObj.x = playerObj.vx > 0 ? wall.x - radius : wall.x + wall.w + radius; }
                    if (axis === 'y') { playerObj.y = playerObj.vy > 0 ? wall.y - radius : wall.y + wall.h + radius; }
                }
            }
        }

        function updateProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; 
                
                if (p.skillNum === 1) {
                    // สกิล 1 พุ่งเส้นตรงเคลื่อนที่ไปเรื่อยๆ ตามปกติ
                    p.x += p.vx; p.y += p.vy;
                    let hitWall = false;
                    for (let wall of walls) { if (p.x > wall.x && p.x < wall.x + wall.w && p.y > wall.y && p.y < wall.y + wall.h) { hitWall = true; } }
                    if (hitWall || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) { projectiles.splice(i, 1); }
                } else {
                    // สกิล 2 ตกจากฟากฟ้า (ค้างอยู่กับที่แล้วค่อยๆ จางหายไปตามเวลาแอนิเมชัน)
                    if(!p.spawnTime) p.spawnTime = Date.now();
                    if(Date.now() - p.spawnTime > 400) { // แสดงผลระเบิดวงกลมจากฟ้า 0.4 วินาทีแล้วเคลียร์ออก
                        projectiles.splice(i, 1);
                    }
                }
            }
            telegraphs = telegraphs.filter(t => t.endTime > Date.now());
        }

        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawWalls();
            
            // คำนวณเวลาแสดงผลข้อความคูลดาวน์ด้านบนหน้าจอ
            let now = Date.now();
            let cd1Text = cooldowns.skill1 > now ? `⏳ CD: ${((cooldowns.skill1 - now)/1000).toFixed(1)}s` : "READY ✅";
            let cd2Text = cooldowns.skill2 > now ? `⏳ CD: ${((cooldowns.skill2 - now)/1000).toFixed(1)}s` : "READY ✅";

            ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(0, 0, canvas.width, 42);
            ctx.fillStyle = "#fff"; ctx.font = "13px Arial"; ctx.textAlign = "center";
            ctx.fillText(`⚔️ ปุ่ม Q (สกิล 1 เส้นตรง): ${cd1Text}   |   ปุ่ม E (สกิล 2 วงกลมตกจากฟ้า): ${cd2Text}`, canvas.width / 2, 26);

            updateLocalPlayer(); lerpPlayers(); updateProjectiles();

            // 🟥 วาดเส้นสีแดงนำทางเตือนล่วงหน้า 1 วินาทีก่อนร่ายเสร็จ 
            telegraphs.forEach(t => {
                let owner = players[t.ownerId];
                if (owner && !owner.isSpectator && owner.health > 0) {
                    let dx = owner.facingX !== undefined ? owner.facingX : 1;
                    let dy = owner.facingY !== undefined ? owner.facingY : 0;

                    ctx.save(); 
                    if (t.skillNum === 1) {
                        // 📏 สกิล 1 วาดเส้นตรงนำทางยาวๆ ล่วงหน้า
                        ctx.strokeStyle = "rgba(255, 71, 87, 0.8)"; 
                        ctx.lineWidth = 2; 
                        ctx.setLineDash([6, 4]);
                        ctx.beginPath(); 
                        ctx.moveTo(owner.x, owner.y - 15); 
                        ctx.lineTo(owner.x + dx * 280, (owner.y - 15) + dy * 280); 
                        ctx.stroke();
                    } else {
                        // ⭕ สกิล 2 วาดจุดพิกัดวงกลมสีแดงกระพริบบนพื้นที่จะระเบิดตกจากฟ้า
                        ctx.strokeStyle = "rgba(255, 71, 87, 0.9)";
                        ctx.lineWidth = 2;
                        ctx.setLineDash([4, 4]);
                        ctx.beginPath();
                        ctx.arc(owner.x + dx * 90, (owner.y - 15) + dy * 90, 45, 0, Math.PI * 2); // รัศมีวงระเบิดขนาด 45 ไม่กว้างไปตามสั่ง
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            });

            // 🚀 วาดเอฟเฟกต์กระสุนและวงระเบิดตกจากฟ้า
            projectiles.forEach(p => {
                ctx.save();
                if (p.skillNum === 1) {
                    // สกิล 1: กระสุน/ลำแสงพุ่งตรง
                    if (p.type === 'fire') {
                        let grad = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, p.r);
                        grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, '#fffa65'); grad.addColorStop(1, '#ff4757');
                        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                    } else {
                        ctx.strokeStyle = '#2becff'; ctx.lineWidth = 3; ctx.fillStyle = '#1e90ff';
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    }
                } else {
                    // สกิล 2: วงกลมระเบิดตูมใหญ่เอฟเฟกต์ตกจากฟากฟ้า ⚡🔥
                    let alpha = 1 - ((Date.now() - p.spawnTime) / 400); // ค่อยๆ เฟดจางออกตามเวลา
                    ctx.globalAlpha = Math.max(0, alpha);
                    
                    if (p.type === 'fire') {
                        // ฝนไฟอุกกาบาตระเบิดวงกว้าง
                        let grad = ctx.createRadialGradient(p.x, p.y, 10, p.x, p.y, p.r);
                        grad.addColorStop(0, 'rgba(255,255,255,0.9)'); grad.addColorStop(0.3, 'rgba(255,165,0,0.8)'); grad.addColorStop(1, 'rgba(255,0,0,0)');
                        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                    } else {
                        // วงแหวนสายฟ้าฟาดจากสวรรค์
                        ctx.strokeStyle = `rgba(43, 236, 255, ${alpha})`; ctx.lineWidth = 4;
                        ctx.fillStyle = "rgba(30, 144, 255, 0.25)";
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    }
                }
                ctx.restore();
            });

            Object.keys(players).forEach(id => {
                let p = players[id];
                let displayColor = p.color || '#ffffff';
                if (p.isSpectator || p.health <= 0) displayColor = 'rgba(150,150,150,0.3)';
                ctx.fillStyle = "#aaa"; ctx.font = "11px Arial"; ctx.textAlign = "center";
                let classNameText = p.charClass === 'mage' ? '🔥 นักเวทย์ไฟ' : '⚡ นินจา';
                ctx.fillText(classNameText, p.x, p.y - 45);
                ctx.fillStyle = displayColor; ctx.font = "bold 13px Arial"; ctx.fillText(p.name, p.x, p.y - 32);
                if (!p.isSpectator && p.health > 0) {
                    let heartString = ""; for(let h=0; h<p.health; h++) { heartString += "❤️ "; }
                    ctx.font = "12px Arial"; ctx.fillText(heartString, p.x, p.y - 58);
                }
                drawStickmanVisual(ctx, p.x, p.y, displayColor, p.hat || 'none', p.vx, p.vy);
            });
            window.requestAnimationFrame(gameLoop);
        }
    </script>
