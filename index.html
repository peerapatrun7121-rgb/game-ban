<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมวิ่งไล่จับขี้ก้างออนไลน์ - บอมบ์ไทม์</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #222; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        #menu-container, #game-container { text-align: center; position: relative; width: 100%; max-width: 800px; }
        #game-container { display: none; }
        canvas { background-color: #111; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .menu-box { background-color: #333; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin: 20px; }
        input[type="text"] { width: 80%; padding: 12px; margin: 20px 0; border: none; border-radius: 5px; font-size: 16px; text-align: center; }
        button { background-color: #ff4757; color: white; border: none; padding: 12px 40px; font-size: 18px; border-radius: 5px; cursor: pointer; transition: 0.2s; width: 50%; }
        button:hover { background-color: #ff6b81; }
        
        /* 🕹️ พื้นที่ควบคุมด้านล่าง แยกออกจากตัวเกม ไม่ทับหน้าจอ */
        #mobile-controls {
            display: none; justify-content: center; align-items: center; 
            padding: 15px 0; background-color: #1a1a1a; width: 100%; margin-top: 10px; border-radius: 10px;
        }
        /* ตัวฐานจอยสติ๊ก */
        #joystick-base {
            width: 120px; height: 120px; background-color: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.4); border-radius: 50%;
            position: relative; touch-action: none; user-select: none; -webkit-user-select: none;
        }
        /* ปุ่มตรงกลางที่ไว้ลากนิ้ว */
        #joystick-stick {
            width: 50px; height: 50px; background-color: #ff4757;
            border-radius: 50%; position: absolute; top: 35px; left: 35px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); touch-action: none;
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <div class="menu-box">
            <h2>เกมวิ่งไล่จับระเบิดขี้ก้าง ออนไลน์</h2>
            <p>ระบบจอยสติ๊กกลมอนาล็อก | แยกพื้นที่ควบคุมไม่บังหน้าจอเกม</p>
            <input type="text" id="username" placeholder="ใส่ชื่อของคุณที่นี่..." maxlength="10">
            <br>
            <button onclick="startGame()">เข้าสู่ห้องเล่นเกม</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div id="mobile-controls">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let socket; let myId; let players = {}; 
        let gameState = { status: "waiting", timer: 0 };
        let gameRunning = false; let isMobile = false;

        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            isMobile = true;
        }

        const walls = [
            { x: 200, y: 150, w: 40, h: 200 },
            { x: 560, y: 150, w: 40, h: 200 },
            { x: 350, y: 230, w: 100, h: 40 }
        ];

        // คีย์บอร์ดและตัวแปรจอยสติ๊ก
        const inputState = { up: false, down: false, left: false, right: false };
        let joystickVector = { x: 0, y: 0 }; // ค่าเวกเตอร์การลากจอย (-1 ถึง 1)

        function setupControls() {
            // คีย์บอร์ดคอมพิวเตอร์ตามปกติ
            window.addEventListener('keydown', e => { handleKey(e.key, true); });
            window.addEventListener('keyup', e => { handleKey(e.key, false); });

            // ระบบจอยสติ๊กสำหรับมือถือ
            if (isMobile) {
                document.getElementById('mobile-controls').style.display = 'flex';
                setupJoystick();
            }
        }

        function handleKey(key, isPressed) {
            key = key.toLowerCase();
            if (key === 'w' || key === 'arrowup') inputState.up = isPressed;
            if (key === 's' || key === 'arrowdown') inputState.down = isPressed;
            if (key === 'a' || key === 'arrowleft') inputState.left = isPressed;
            if (key === 'd' || key === 'arrowright') inputState.right = isPressed;
        }

        // 🕹️ ฟังก์ชันคำนวณการลากจอยสติ๊กกลม
        function setupJoystick() {
            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');
            
            let maxRadius = 35; // ระยะลากสูงสุดจากจุดศูนย์กลาง
            let dragStart = null;

            base.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const baseRect = base.getBoundingClientRect();
                // หาจุดศูนย์กลางของจอย
                dragStart = {
                    x: baseRect.left + baseRect.width / 2,
                    y: baseRect.top + baseRect.height / 2
                };
                stick.style.backgroundColor = "#ff6b81";
            });

            base.addEventListener('touchmove', (e) => {
                if (!dragStart) return;
                e.preventDefault();
                const touch = e.touches[0];
                
                // หาค่าระยะห่างจากจุดศูนย์กลาง
                let deltaX = touch.clientX - dragStart.x;
                let deltaY = touch.clientY - dragStart.y;
                let distance = Math.hypot(deltaX, deltaY);

                // ล็อกไม่ให้หัวจอยหลุดออกจากวงกลมฐาน
                if (distance > maxRadius) {
                    deltaX = (deltaX / distance) * maxRadius;
                    deltaY = (deltaY / distance) * maxRadius;
                    distance = maxRadius;
                }

                // ขยับหัวจอยทาง CSS (จุดเริ่มต้นคือ top:35px, left:35px)
                stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                // แปลงค่าเป็นเวกเตอร์ความเร็วระว่าง -1 ถึง 1 ส่งไปให้ตัวละครเดิน
                joystickVector.x = deltaX / maxRadius;
                joystickVector.y = deltaY / maxRadius;
            });

            const stopJoystick = (e) => {
                if (!dragStart) return;
                e.preventDefault();
                dragStart = null;
                stick.style.transform = `translate(0px, 0px)`; // ดีดกลับตรงกลาง
                stick.style.backgroundColor = "#ff4757";
                joystickVector.x = 0;
                joystickVector.y = 0;
            };

            base.addEventListener('touchend', stopJoystick);
            base.addEventListener('touchcancel', stopJoystick);
        }

        function drawStickman(x, y, name, isIt, vx, vy, bombTimer, isSpectator, cooldown) {
            let color = isIt ? '#ff4757' : '#ffffff';
            if (isSpectator) color = 'rgba(150,150,150,0.35)';
            if (cooldown > 0) color = '#ff9f43';

            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 3;
            ctx.font = "14px Arial"; ctx.textAlign = "center";
            ctx.fillText(name + (isSpectator ? " [คนดู]" : "") + (cooldown > 0 ? " [CD]" : ""), x, y - 32);

            if (isIt && !isSpectator) {
                ctx.font = "bold 18px Arial";
                ctx.fillText(`💣 ${bombTimer}s`, x, y - 52);
            }

            ctx.beginPath(); ctx.arc(x, y - 15, 6, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y - 9); ctx.lineTo(x, y + 5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x - 10, y - 5); ctx.lineTo(x + 10, y - 5); ctx.stroke();
            
            let limitedVx = Math.max(-4.0, Math.min(4.0, vx));
            ctx.beginPath(); ctx.moveTo(x, y + 5);
            ctx.lineTo(x - 6 + (limitedVx * 2), y + 18); ctx.moveTo(x, y + 5);
            ctx.lineTo(x + 6 - (limitedVx * 2), y + 18); ctx.stroke();
        }

        function drawWalls() {
            ctx.fillStyle = '#444444'; ctx.strokeStyle = '#666666'; ctx.lineWidth = 2;
            walls.forEach(wall => { ctx.fillRect(wall.x, wall.y, wall.w, wall.h); ctx.strokeRect(wall.x, wall.y, wall.w, wall.h); });
        }

        function startGame() {
            let nameInput = document.getElementById('username').value.trim();
            if (nameInput === "") nameInput = "Player_" + Math.floor(Math.random() * 900 + 100);

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            setupControls();
            socket = io('https://tag-game-server.onrender.com'); 

            socket.on('connect', () => { myId = socket.id; socket.emit('join_game', { name: nameInput }); });
            
            socket.on('current_players', (serverPlayers) => { 
                Object.keys(serverPlayers).forEach(id => {
                    serverPlayers[id].targetX = serverPlayers[id].x;
                    serverPlayers[id].targetY = serverPlayers[id].y;
                });
                players = serverPlayers; 
            });
            
            socket.on('new_player', (newPlayerData) => { 
                newPlayerData.targetX = newPlayerData.x;
                newPlayerData.targetY = newPlayerData.y;
                players[newPlayerData.id] = newPlayerData; 
            });
            
            socket.on('player_updated', (updatedPlayer) => { 
                if (!players[updatedPlayer.id]) {
                    players[updatedPlayer.id] = updatedPlayer;
                    players[updatedPlayer.id].targetX = updatedPlayer.x;
                    players[updatedPlayer.id].targetY = updatedPlayer.y;
                } else {
                    players[updatedPlayer.id].isIt = updatedPlayer.isIt;
                    players[updatedPlayer.id].bombTimer = updatedPlayer.bombTimer;
                    players[updatedPlayer.id].cooldown = updatedPlayer.cooldown;
                    players[updatedPlayer.id].isSpectator = updatedPlayer.isSpectator;
                    
                    if (updatedPlayer.id !== myId) {
                        players[updatedPlayer.id].vx = updatedPlayer.vx;
                        players[updatedPlayer.id].vy = updatedPlayer.vy;
                        players[updatedPlayer.id].targetX = updatedPlayer.x;
                        players[updatedPlayer.id].targetY = updatedPlayer.y;
                    }
                }
            });
            
            socket.on('player_disconnected', (id) => { delete players[id]; });
            socket.on('game_state_update', (state) => { gameState = state; });

            socket.on('you_exploded', () => {
                alert("💥 ตู้มมม! คุณถือระเบิดนานเกินไปจนระเบิดทำงานตกรอบครับ!");
                location.reload();
            });

            socket.on('game_over_winner', (winnerName) => {
                alert(`🎉 จบรอบ! ผู้ชนะที่อยู่รอดคนสุดท้ายคือคุณ: ${winnerName}!!`);
            });

            gameRunning = true; window.requestAnimationFrame(gameLoop);
        }

        function updateLocalPlayer() {
            let me = players[myId];
            if (!me || me.isSpectator) return;

            let baseSpeed = 4.0; 
            let targetVx = 0;
            let targetVy = 0;

            if (isMobile) {
                // 📱 ใช้ค่าความเร็วราบรื่นแบบ 360 องศาจากจอยสติ๊กอนาล็อก
                targetVx = joystickVector.x * baseSpeed;
                targetVy = joystickVector.y * baseSpeed;
            } else {
                // 💻 ใช้ปุ่มคีย์บอร์ดคอมพิวเตอร์ปกติ
                if (inputState.up) targetVy = -baseSpeed;
                if (inputState.down) targetVy = baseSpeed;
                if (inputState.left) targetVx = -baseSpeed;
                if (inputState.right) targetVx = baseSpeed;

                if (targetVx !== 0 && targetVy !== 0) {
                    targetVx *= 0.7071;
                    targetVy *= 0.7071;
                }
            }

            me.vx = targetVx;
            me.vy = targetVy;

            let radius = 12;
            me.x += me.vx;
            handleWallCollision(me, 'x', radius);
            me.x = Math.max(radius, Math.min(canvas.width - radius, me.x));

            me.y += me.vy;
            handleWallCollision(me, 'y', radius);
            me.y = Math.max(radius + 40, Math.min(canvas.height - radius, me.y));

            if (socket && socket.connected) {
                socket.emit('player_move_direct', {
                    x: me.x,
                    y: me.y,
                    vx: me.vx,
                    vy: me.vy
                });
            }
        }

        function lerpPlayers() {
            Object.keys(players).forEach(id => {
                let p = players[id];
                if (id !== myId) {
                    if (p.targetX !== undefined && p.targetY !== undefined) {
                        p.x += (p.targetX - p.x) * 0.25; 
                        p.y += (p.targetY - p.y) * 0.25;
                    }
                }
            });
        }

        function handleWallCollision(playerObj, axis, radius) {
            for (let wall of walls) {
                if (playerObj.x + radius > wall.x && playerObj.x - radius < wall.x + wall.w &&
                    playerObj.y + radius > wall.y && playerObj.y - radius < wall.y + wall.h) {
                    if (axis === 'x') {
                        if (playerObj.vx > 0) playerObj.x = wall.x - radius;
                        if (playerObj.vx < 0) playerObj.x = wall.x + wall.w + radius;
                    }
                    if (axis === 'y') {
                        if (playerObj.vy > 0) playerObj.y = wall.y - radius;
                        if (playerObj.vy < 0) playerObj.y = wall.y + wall.h + radius;
                    }
                }
            }
        }

        function checkCollisions() {
            let me = players[myId];
            if (!me || !me.isIt || me.isSpectator || me.cooldown > 0) return; 

            Object.keys(players).forEach(id => {
                if (id === myId) return;
                let other = players[id];
                if (other.isSpectator || other.cooldown > 0) return; 

                let dist = Math.hypot(me.x - other.x, me.y - other.y);
                if (dist < 28) { socket.emit('tag_player', { itId: myId, taggedId: id }); }
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawWalls();

            ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, canvas.width, 40);
            ctx.fillStyle = "#fff"; ctx.font = "bold 15px Arial"; ctx.textAlign = "center";

            if (gameState.status === "waiting") {
                ctx.fillStyle = "#ffb8b8"; ctx.fillText("⚠️ [ รอผู้เล่น ] ต้องการผู้เล่นอย่างน้อย 2 คนเพื่อเริ่มเกม", canvas.width / 2, 25);
            } else if (gameState.status === "countdown") {
                ctx.fillStyle = "#fffa65"; ctx.fillText("🎮 ผู้เล่นครบแล้ว! กำลังจะเริ่มในอีก " + gameState.timer + " วินาที...", canvas.width / 2, 25);
            } else if (gameState.status === "playing") {
                ctx.fillStyle = "#2ed573"; ctx.fillText("💥 รอบการแข่งขันกำลังดำเนินอยู่! เอาระเบิดไปแปะส่งต่อคนอื่นเพื่อเอาชีวิตรอด!", canvas.width / 2, 25);
            }

            updateLocalPlayer(); 
            lerpPlayers(); 
            checkCollisions();

            Object.keys(players).forEach(id => {
                let p = players[id];
                drawStickman(p.x, p.y, p.name, p.isIt, p.vx, p.vy, p.bombTimer, p.isSpectator, p.cooldown || 0);
            });
            window.requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
