<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ศึกขี้ก้างประจันบานออนไลน์ - Class Battle</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #222; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        #menu-container, #game-container { text-align: center; position: relative; width: 100%; max-width: 800px; }
        #game-container { display: none; }
        canvas { background-color: #111; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        .menu-box { background-color: #333; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin: 10px; }
        input[type="text"] { width: 80%; padding: 10px; margin: 5px 0; border: none; border-radius: 5px; font-size: 16px; text-align: center; background: #444; color: #fff; }
        
        /* 🎨 ปรับปรุงโซนแต่งตัวและเลือกคลาส */
        .customize-section { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0; background: #2a2a2a; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
        
        /* ขยายขนาดตัวพรีวิวขี้ก้างให้ใหญ่ชัดเจนในมือถือ 🌟 */
        .preview-box { background: #111; border: 2px solid #555; border-radius: 5px; width: 130px; height: 160px; }
        
        .options-box { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .color-picker, .hat-picker, .class-picker { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
        .color-dot.active { border-color: #ff4757; transform: scale(1.1); }
        .btn-option { background: #444; color: white; border: 1px solid #666; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-option.active { background: #ff4757; border-color: #ff6b81; }

        button.btn-start { background-color: #ff4757; color: white; border: none; padding: 12px 40px; font-size: 18px; border-radius: 5px; cursor: pointer; transition: 0.2s; width: 60%; font-weight: bold; margin-top: 5px; }
        
        /* 🕹️ โซนปุ่มควบคุมมือถือและสกิล */
        #mobile-controls {
            display: none; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background-color: #1a1a1a; width: 100%; margin-top: 5px; border-radius: 10px; box-sizing: border-box;
        }
        #joystick-base {
            width: 100px; height: 100px; background-color: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.4); border-radius: 50%; position: relative; touch-action: none;
        }
        #joystick-stick {
            width: 40px; height: 40px; background-color: #ff4757;
            border-radius: 50%; position: absolute; top: 27px; left: 27px; touch-action: none;
        }
        .skill-container { display: flex; gap: 15px; }
        .btn-skill {
            width: 55px; height: 55px; background-color: #2f3542; border: 2px solid #57606f;
            border-radius: 50%; color: white; font-weight: bold; font-size: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-skill:active { background-color: #ff4757; }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <div class="menu-box">
            <h2>⚔️ ศึกขี้ก้างประจันบาน ออนไลน์ ⚔️</h2>
            <p style="font-size: 13px; color: #aaa; margin: 0;">เลือกคลาส สกิลเล็งเส้นแดง และสู้ด้วยระบบ 3 หัวใจ</p>
            
            <input type="text" id="username" placeholder="ใส่ชื่อของคุณที่นี่..." maxlength="10">
            
            <div class="customize-section">
                <div>
                    <canvas id="previewCanvas" width="130" height="160" class="preview-box"></canvas>
                </div>
                <div class="options-box">
                    <div>
                        <span style="font-size:13px; font-weight:bold;">🎨 สีตัวละคร:</span>
                        <div class="color-picker">
                            <div class="color-dot" style="background:#ffffff;" onclick="selectColor('#ffffff')" id="col-#ffffff"></div>
                            <div class="color-dot" style="background:#3498db;" onclick="selectColor('#3498db')" id="col-#3498db"></div>
                            <div class="color-dot" style="background:#2ecc71;" onclick="selectColor('#2ecc71')" id="col-#2ecc71"></div>
                            <div class="color-dot" style="background:#f1c40f;" onclick="selectColor('#f1c40f')" id="col-#f1c40f"></div>
                            <div class="color-dot" style="background:#e91e63;" onclick="selectColor('#e91e63')" id="col-#e91e63"></div>
                        </div>
                    </div>
                    <div>
                        <span style="font-size:13px; font-weight:bold;">🎩 หมวกตกแต่ง:</span>
                        <div class="hat-picker">
                            <button class="btn-option" onclick="selectHat('none')" id="hat-none">ไม่มี</button>
                            <button class="btn-option" onclick="selectHat('cowboy')" id="hat-cowboy">คาวบอย</button>
                            <button class="btn-option" onclick="selectHat('chef')" id="hat-chef">เชฟ</button>
                            <button class="btn-option" onclick="selectHat('crown')" id="hat-crown">มงกุฎ</button>
                        </div>
                    </div>
                    <div>
                        <span style="font-size:13px; font-weight:bold;">🛡️ เลือกคลาสอาชีพ:</span>
                        <div class="class-picker">
                            <button class="btn-option" onclick="selectClass('mage')" id="class-mage">🔥 นักเวทย์ไฟ</button>
                            <button class="btn-option" onclick="selectClass('ninja')" id="class-ninja">⚡ นินจาสายฟ้า</button>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-start" onclick="startGame()">เข้าสู่สนามรบ</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="mobile-controls">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
            <div class="skill-container">
                <div class="btn-skill" onclick="useSkill(1)"><span>SKILL 1</span><span style="font-size:9px;color:#ff4757;">[J]</span></div>
                <div class="btn-skill" onclick="useSkill(2)"><span>SKILL 2</span><span style="font-size:9px;color:#ff4757;">[K]</span></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pCanvas = document.getElementById('previewCanvas');
        const pCtx = pCanvas.getContext('2d');

        let socket; let myId; let players = {}; 
        let projectiles = []; let telegraphs = [];
        let gameState = { status: "playing" };
        let gameRunning = false; let isMobile = false;

        let myCustomColor = localStorage.getItem('b_color') || '#ffffff';
        let myCustomHat = localStorage.getItem('b_hat') || 'none';
        let mySelectedClass = localStorage.getItem('b_class') || 'mage';

        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            isMobile = true;
        }

        const walls = [
            { x: 200, y: 150, w: 40, h: 200 },
            { x: 560, y: 150, w: 40, h: 200 },
            { x: 350, y: 230, w: 100, h: 40 }
        ];

        const inputState = { up: false, down: false, left: false, right: false };
        let joystickVector = { x: 0, y: 0 };
        let lastFacingDir = { x: 1, y: 0 }; // ทิศทางล่าสุดที่หันไปใช้เล็งสกิล

        window.onload = () => {
            if(localStorage.getItem('b_name')) { document.getElementById('username').value = localStorage.getItem('b_name'); }
            updateCustomUI();
            drawPreview();
        };

        function updateCustomUI() {
            document.querySelectorAll('.color-dot').forEach(el => el.classList.remove('active'));
            if(document.getElementById(`col-${myCustomColor}`)) document.getElementById(`col-${myCustomColor}`).classList.add('active');

            document.querySelectorAll('.hat-picker .btn-option').forEach(el => el.classList.remove('active'));
            if(document.getElementById(`hat-${myCustomHat}`)) document.getElementById(`hat-${myCustomHat}`).classList.add('active');

            document.querySelectorAll('.class-picker .btn-option').forEach(el => el.classList.remove('active'));
            if(document.getElementById(`class-${mySelectedClass}`)) document.getElementById(`class-${mySelectedClass}`).classList.add('active');
        }

        function selectColor(color) { myCustomColor = color; localStorage.setItem('b_color', color); updateCustomUI(); drawPreview(); }
        function selectHat(hat) { myCustomHat = hat; localStorage.setItem('b_hat', hat); updateCustomUI(); drawPreview(); }
        function selectClass(cls) { mySelectedClass = cls; localStorage.setItem('b_class', cls); updateCustomUI(); drawPreview(); }

        function drawPreview() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            // ขยายสเกลการวาดในหน้า Preview เพื่อให้รูปตัวใหญ่เต็มตา 🌟
            pCtx.save();
            pCtx.scale(1.4, 1.4);
            drawStickmanVisual(pCtx, 45, 80, myCustomColor, myCustomHat, 0, 0);
            pCtx.restore();
        }

        function drawStickmanVisual(context, x, y, baseColor, hatType, vx, vy) {
            context.strokeStyle = baseColor; context.fillStyle = baseColor; context.lineWidth = 3;
            context.beginPath(); context.arc(x, y - 15, 6, 0, Math.PI * 2); context.stroke();
            context.beginPath(); context.moveTo(x, y - 9); context.lineTo(x, y + 5); context.stroke();
            context.beginPath(); context.moveTo(x - 10, y - 5); context.lineTo(x + 10, y - 5); context.stroke();
            
            let limitedVx = Math.max(-4.0, Math.min(4.0, vx));
            context.beginPath(); context.moveTo(x, y + 5);
            context.lineTo(x - 6 + (limitedVx * 2), y + 18); context.moveTo(x, y + 5);
            context.lineTo(x + 6 - (limitedVx * 2), y + 18); context.stroke();

            if(hatType !== 'none') {
                context.fillStyle = (hatType === 'crown') ? '#f1c40f' : ((hatType === 'chef') ? '#fff' : baseColor);
                if (hatType === 'cowboy') {
                    context.fillRect(x - 14, y - 22, 28, 3); context.fillRect(x - 8, y - 32, 16, 10);
                } else if (hatType === 'chef') {
                    context.beginPath(); context.arc(x, y - 25, 8, 0, Math.PI * 2); context.fill();
                    context.fillRect(x - 6, y - 22, 12, 6);
                } else if (hatType === 'crown') {
                    context.beginPath(); context.moveTo(x - 9, y - 20); context.lineTo(x - 12, y - 30); context.lineTo(x - 4, y - 24); context.lineTo(x, y - 34); context.lineTo(x + 4, y - 24); context.lineTo(x + 12, y - 30); context.lineTo(x + 9, y - 20); context.closePath(); context.fill();
                }
            }
        }

        function setupControls() {
            window.addEventListener('keydown', e => { 
                handleKey(e.key, true); 
                if(e.key.toLowerCase() === 'j') useSkill(1);
                if(e.key.toLowerCase() === 'k') useSkill(2);
            });
            window.addEventListener('keyup', e => { handleKey(e.key, false); });
            if (isMobile) { document.getElementById('mobile-controls').style.display = 'flex'; setupJoystick(); }
        }

        function handleKey(key, isPressed) {
            key = key.toLowerCase();
            if (key === 'w' || key === 'arrowup') inputState.up = isPressed;
            if (key === 's' || key === 'arrowdown') inputState.down = isPressed;
            if (key === 'a' || key === 'arrowleft') inputState.left = isPressed;
            if (key === 'd' || key === 'arrowright') inputState.right = isPressed;
        }

        function setupJoystick() {
            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');
            let maxRadius = 30; let dragStart = null;

            base.addEventListener('touchstart', (e) => {
                e.preventDefault(); const touch = e.touches[0]; const baseRect = base.getBoundingClientRect();
                dragStart = { x: baseRect.left + baseRect.width / 2, y: baseRect.top + baseRect.height / 2 };
            });
            base.addEventListener('touchmove', (e) => {
                if (!dragStart) return; e.preventDefault(); const touch = e.touches[0];
                let deltaX = touch.clientX - dragStart.x; let deltaY = touch.clientY - dragStart.y;
                let distance = Math.hypot(deltaX, deltaY);
                if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; }
                stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                joystickVector.x = deltaX / maxRadius; joystickVector.y = deltaY / maxRadius;
            });
            const stopJoystick = (e) => {
                if (!dragStart) return; dragStart = null; stick.style.transform = `translate(0px, 0px)`;
                joystickVector.x = 0; joystickVector.y = 0;
            };
            base.addEventListener('touchend', stopJoystick); base.addEventListener('touchcancel', stopJoystick);
        }

        function drawWalls() {
            ctx.fillStyle = '#444444'; ctx.strokeStyle = '#666666'; ctx.lineWidth = 2;
            walls.forEach(wall => { ctx.fillRect(wall.x, wall.y, wall.w, wall.h); ctx.strokeRect(wall.x, wall.y, wall.w, wall.h); });
        }

        function useSkill(skillNumber) {
            let me = players[myId];
            if (!me || me.isSpectator || me.health <= 0) return;
            
            // ส่งคำสั่งใช้สกิลไปเซิร์ฟเวอร์ พร้อมทิศทางที่เล็ง
            socket.emit('cast_skill', {
                skillNum: skillNumber,
                dirX: lastFacingDir.x,
                dirY: lastFacingDir.y
            });
        }

        function startGame() {
            let nameInput = document.getElementById('username').value.trim();
            if (nameInput === "") nameInput = "Player_" + Math.floor(Math.random() * 900 + 100);
            localStorage.setItem('b_name', nameInput);

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            setupControls();
            socket = io('https://tag-game-server.onrender.com'); 

            socket.on('connect', () => { 
                myId = socket.id; 
                socket.emit('join_game', { name: nameInput, color: myCustomColor, hat: myCustomHat, charClass: mySelectedClass }); 
            });
            
            socket.on('current_players', (serverPlayers) => { 
                Object.keys(serverPlayers).forEach(id => { serverPlayers[id].targetX = serverPlayers[id].x; serverPlayers[id].targetY = serverPlayers[id].y; });
                players = serverPlayers; 
            });
            socket.on('new_player', (newPlayerData) => { newPlayerData.targetX = newPlayerData.x; newPlayerData.targetY = newPlayerData.y; players[newPlayerData.id] = newPlayerData; });
            
            socket.on('player_updated', (updatedPlayer) => { 
                if (!players[updatedPlayer.id]) {
                    players
