<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมวิ่งไล่จับขี้ก้างออนไลน์ - บอมบ์ไทม์</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #222; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }
        #menu-container, #game-container { text-align: center; position: relative; width: 100%; max-width: 800px; }
        #game-container { display: none; }
        canvas { background-color: #111; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; height: auto; }
        .menu-box { background-color: #333; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin: 20px; }
        input[type="text"] { width: 80%; padding: 12px; margin: 20px 0; border: none; border-radius: 5px; font-size: 16px; text-align: center; }
        button { background-color: #ff4757; color: white; border: none; padding: 12px 40px; font-size: 18px; border-radius: 5px; cursor: pointer; transition: 0.2s; width: 50%; }
        button:hover { background-color: #ff6b81; }
        
        /* จัดแต่งหน้าตาแผงปุ่มกดจำลองแบบ WASD บนหน้าจอมือถือ */
        #mobile-controls {
            display: none;
            margin-top: 15px;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .wasd-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wasd-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 6px 0;
        }
        .btn-wasd {
            width: 55px;
            height: 55px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px; /* ทำมุมโค้งมนเหมือนปุ่มคีย์บอร์ด */
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        /* เอฟเฟกต์ตอนเอานิ้วกดปุ่ม */
        .btn-wasd:active {
            background-color: rgba(255, 71, 87, 0.7);
            border-color: #ff4757;
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.4);
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <div class="menu-box">
            <h2>เกมวิ่งไล่จับระเบิดขี้ก้าง ออนไลน์</h2>
            <p>ระบบรอบการเล่น | ปุ่มควบคุมจำลอง WASD บนมือถือ | โหมดคนดู</p>
            <input type="text" id="username" placeholder="ใส่ชื่อของคุณที่นี่..." maxlength="10">
            <br>
            <button onclick="startGame()">เข้าสู่ห้องเล่นเกม</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div id="mobile-controls">
            <div class="wasd-cluster">
                <div class="wasd-row">
                    <div class="btn-wasd" id="btn-w">W</div>
                </div>
                <div class="wasd-row">
                    <div class="btn-wasd" id="btn-a">A</div>
                    <div class="btn-wasd" id="btn-s">S</div>
                    <div class="btn-wasd" id="btn-d">D</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let socket; let myId; let players = {}; 
        let gameState = { status: "waiting", timer: 0 };
        let gameRunning = false; let isMobile = false;

        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            isMobile = true;
        }

        const walls = [
            { x: 200, y: 150, w: 40, h: 200 },
            { x: 560, y: 150, w: 40, h: 200 },
            { x: 350, y: 230, w: 100, h: 40 }
        ];

        // ตัวแปรเก็บสถานะเปิด/ปิดปุ่มกด (แชร์ระบบคำนวณร่วมกันทำให้ความเร็วเสถียร)
        const inputState = { up: false, down: false, left: false, right: false };

        function setupControls() {
            // ควบคุมบนคอมพิวเตอร์
            window.addEventListener('keydown', e => { handleKey(e.key, true); });
            window.addEventListener('keyup', e => { handleKey(e.key, false); });

            // ควบคุมบนมือถือ (เปิดแสดงแผงปุ่ม WASD และผูกปุ่ม)
            if (isMobile) {
                document.getElementById('mobile-controls').style.display = 'flex';
                setupMobileButton('btn-w', 'up');
                setupMobileButton('btn-s', 'down');
                setupMobileButton('btn-a', 'left');
                setupMobileButton('btn-d', 'right');
            }
        }

        function handleKey(key, isPressed) {
            key = key.toLowerCase();
            if (key === 'w' || key === 'arrowup') inputState.up = isPressed;
            if (key === 's' || key === 'arrowdown') inputState.down = isPressed;
            if (key === 'a' || key === 'arrowleft') inputState.left = isPressed;
            if (key === 'd' || key === 'arrowright') inputState.right = isPressed;
        }

        // ดักจับการแตะนิ้ว (รองรับการกดพร้อมกันเพื่อเดินเฉียงได้เหมือนคอมพิวเตอร์)
        function setupMobileButton(id, direction) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); inputState[direction] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); inputState[direction] = false; });
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); inputState[direction] = false; });
        }

        function drawStickman(x, y, name, isIt, vx, vy, bombTimer, isSpectator, cooldown) {
            let color = isIt ? '#ff4757' : '#ffffff';
            if (isSpectator) color = 'rgba(150,150,150,0.35)';
            if (cooldown > 0) color = '#ff9f43';

            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 3;
            ctx.font = "14px Arial"; ctx.textAlign = "center";
            ctx.fillText(name + (isSpectator ? " [คนดู]" : "") + (cooldown > 0 ? " [CD]" : ""), x, y - 32);

            if (isIt && !isSpectator) {
                ctx.font = "bold 18px Arial";
                ctx.fillText(`💣 ${bombTimer}s`, x, y - 52);
            }

            ctx.beginPath(); ctx.arc(x, y - 15, 6, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y - 9); ctx.lineTo(x, y + 5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x - 10, y - 5); ctx.lineTo(x + 10, y - 5); ctx.stroke();
            
            let limitedVx = Math.max(-3.5, Math.min(3.5, vx));
            ctx.beginPath(); ctx.moveTo(x, y + 5);
            ctx.lineTo(x - 6 + (limitedVx * 2), y + 18); ctx.moveTo(x, y + 5);
            ctx.lineTo(x + 6 - (limitedVx * 2), y + 18); ctx.stroke();
        }

        function drawWalls() {
            ctx.fillStyle = '#444444'; ctx.strokeStyle = '#666666'; ctx.lineWidth = 2;
            walls.forEach(wall => { ctx.fillRect(wall.x, wall.y, wall.w, wall.h); ctx.strokeRect(wall.x, wall.y, wall.w, wall.h); });
        }

        function startGame() {
            let nameInput = document.getElementById('username').value.trim();
            if (nameInput === "") nameInput = "Player_" + Math.floor(Math.random() * 900 + 100);

            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            setupControls();
            socket = io('https://tag-game-server.onrender.com'); 

            socket.on('connect', () => { myId = socket.id; socket.emit('join_game', { name: nameInput }); });
            socket.on('current_players', (serverPlayers) => { players = serverPlayers; });
            socket.on('new_player', (newPlayerData) => { players[newPlayerData.id] = newPlayerData; });
            socket.on('player_updated', (updatedPlayer) => { if (players[updatedPlayer.id]) players[updatedPlayer.id] = updatedPlayer; });
            socket.on('player_disconnected', (id) => { delete players[id]; });
            socket.on('game_state_update', (state) => { gameState = state; });

            socket.on('you_exploded', () => {
                alert("💥 ตู้มมม! คุณถือระเบิดนานเกินไปจนระเบิดทำงานตกรอบครับ!");
                location.reload();
            });

            socket.on('game_over_winner', (winnerName) => {
                alert(`🎉 จบรอบ! ผู้ชนะที่อยู่รอดคนสุดท้ายคือคุณ: ${winnerName}!!`);
            });

            gameRunning = true; window.requestAnimationFrame(gameLoop);
        }

        function updateLocalPlayer() {
            let me = players[myId];
            if (!me || me.isSpectator) return;

            // ส่งสถานะปุ่มกดปัจจุบัน (ทั้งคอมฯ และแผงปุ่มบนมือถือ) ไปให้เซิร์ฟเวอร์หลังบ้านประมวลผล
            if (socket && socket.connected) {
                socket.emit('player_move', {
                    up: inputState.up,
                    down: inputState.down,
                    left: inputState.left,
                    right: inputState.right
                });
            }
        }

        function handleWallCollision(playerObj, axis, radius) {
            for (let wall of walls) {
                if (playerObj.x + radius > wall.x && playerObj.x - radius < wall.x + wall.w &&
                    playerObj.y + radius > wall.y && playerObj.y - radius < wall.y + wall.h) {
                    if (axis === 'x') {
                        if (playerObj.vx > 0) playerObj.x = wall.x - radius;
                        if (playerObj.vx < 0) playerObj.x = wall.x + wall.w + 12;
                    }
                    if (axis === 'y') {
                        if (playerObj.vy > 0) playerObj.y = wall.y - radius;
                        if (playerObj.vy < 0) playerObj.y = wall.y + wall.h + 12;
                    }
                }
            }
        }

        function checkCollisions() {
            let me = players[myId];
            if (!me || !me.isIt || me.isSpectator || me.cooldown > 0) return; 

            Object.keys(players).forEach(id => {
                if (id === myId) return;
                let other = players[id];
                if (other.isSpectator || other.cooldown > 0) return; 

                let dist = Math.hypot(me.x - other.x, me.y - other.y);
                if (dist < 28) { socket.emit('tag_player', { itId: myId, taggedId: id }); }
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawWalls();

            ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, canvas.width, 40);
            ctx.fillStyle = "#fff"; ctx.font = "bold 15px Arial"; ctx.textAlign = "center";

            if (gameState.status === "waiting") {
                ctx.fillStyle = "#ffb8b8"; ctx.fillText("⚠️ [ รอผู้เล่น ] ต้องการผู้เล่นอย่างน้อย 2 คนเพื่อเริ่มเกม", canvas.width / 2, 25);
            } else if (gameState.status === "countdown") {
                ctx.fillStyle = "#fffa65"; ctx.fillText(`🎮 ผู้เล่นครบแล้ว! กำลังจะเริ่มในอีก ${gameState.timer} วินาที...`, canvas.width / 2, 25);
            } else if (gameState.status === "playing") {
                ctx.fillStyle = "#2ed573"; ctx.fillText("💥 รอบการแข่งขันกำลังดำเนินอยู่! เอาระเบิดไปแปะส่งต่อคนอื่นเพื่อเอาชีวิตรอด!", canvas.width / 2, 25);
            }

            updateLocalPlayer(); checkCollisions();

            Object.keys(players).forEach(id => {
                let p = players[id];
                drawStickman(p.x, p.y, p.name, p.isIt, p.vx, p.vy, p.bombTimer, p.isSpectator, p.cooldown || 0);
            });
            window.requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
